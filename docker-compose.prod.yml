# Production deployment for the eshop.
# Usage on EC2:
#   docker build -t eshop-app:local .
#   docker compose -f docker-compose.prod.yml up -d
#
# Runs on port 8081 (recipe site uses 8080).
# MySQL data persists on /mnt/data/eshop-mysql.

services:
  web:
    image: eshop-app:local
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=eshop
      - DB_USER=root
      - DB_PASS=root
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eshop
    expose:
      - "3306"
    volumes:
      - /mnt/data/eshop-mysql:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 2s
      timeout: 2s
      retries: 5
    restart: unless-stopped
